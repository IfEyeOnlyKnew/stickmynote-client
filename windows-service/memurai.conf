# ==============================================================================
# MEMURAI PRODUCTION CONFIGURATION
# Stick My Note Application - HOL-DC5-REDIS (192.168.50.50)
# ==============================================================================

################################## NETWORK #####################################

# Bind to specific IP address to allow connections from Web Server
bind 192.168.50.50

# Disable protected mode since we're using requirepass authentication
protected-mode no

# Accept connections on the specified port
port 6379

# TCP listen() backlog - High value for production
tcp-backlog 511

# Close idle connections after 300 seconds (5 minutes)
timeout 300

# TCP keepalive - Detect dead connections
tcp-keepalive 300

################################# GENERAL #####################################

# Set appropriate log level for production
loglevel notice

# Specify log file location
logfile "C:\\inetpub\\Memurai\\logs\\memurai.log"

# Windows Event Log level
winlog-level notice

# Instance name for identification in logs
instance-name "StickMyNote-Redis"

# Number of databases
databases 16

################################ SNAPSHOTTING  ################################

# Save DB snapshots
save 3600 1 300 100 60 10000

# Stop writes if snapshot fails (safety)
stop-writes-on-bgsave-error yes

# Enable compression for RDB files
rdbcompression yes

# Enable RDB checksum verification
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# Delete RDB files during replication (disabled for persistence)
rdb-del-sync-files no

# Working directory for data files
dir C:\\inetpub\\Memurai\\data\\

################################## SECURITY ###################################

# REQUIRED - Set strong password for production
# Replace 'YourStrongRedisPassword123!' with your actual secure password
requirepass YourStrongRedisPassword123!

# Rename dangerous commands for security
rename-command CONFIG ""
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command SHUTDOWN SHUTDOWN_SECRET_COMMAND

################################### CLIENTS ####################################

# Set max number of concurrent clients
maxclients 10000

############################## MEMORY MANAGEMENT ###############################

# Set maximum memory limit (4GB for production)
maxmemory 4gb

# Eviction policy when maxmemory is reached
maxmemory-policy allkeys-lru

# Number of samples for LRU algorithm
maxmemory-samples 5

############################# LAZY FREEING ####################################

# Enable lazy freeing for better performance
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

############################ KERNEL OOM CONTROL ##############################

# Disable OOM killer (Windows doesn't use this)
oom-score-adj no

################################ THREADED I/O #################################

# Enable multi-threading for network I/O
io-threads 4
io-threads-do-reads yes

############################## APPEND ONLY MODE ###############################

# Enable AOF (Append Only File) for better durability
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# AOF sync strategy
appendfsync everysec

# Rewrite AOF file when it grows by 100%
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Load truncated AOF file at startup
aof-load-truncated yes

# Use RDB-AOF hybrid format for faster restarts
aof-use-rdb-preamble yes

################################## SLOW LOG ###################################

# Log queries slower than 10 milliseconds
slowlog-log-slower-than 10000

# Keep last 128 slow queries
slowlog-max-len 128

################################ LATENCY MONITOR ##############################

# Enable latency monitoring
latency-monitor-threshold 100

############################# EVENT NOTIFICATION ##############################

# Disable keyspace notifications (enable if needed)
notify-keyspace-events ""

############################### ADVANCED CONFIG ###############################

# Hash data structure optimization
hash-max-listpack-entries 512
hash-max-listpack-value 64

# List data structure optimization
list-max-listpack-size -2
list-compress-depth 0

# Set data structure optimization
set-max-intset-entries 512
set-max-listpack-entries 128
set-max-listpack-value 64

# Sorted set data structure optimization
zset-max-listpack-entries 128
zset-max-listpack-value 64

# HyperLogLog optimization
hll-sparse-max-bytes 3000

# Stream data structure optimization
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active rehashing
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Frequency of rehashing the main dict
hz 10

# Enable adaptive HZ
dynamic-hz yes

# AOF rewrite incremental fsync
aof-rewrite-incremental-fsync yes

# RDB save incremental fsync
rdb-save-incremental-fsync yes

# ==============================================================================
# END OF CONFIGURATION
# ==============================================================================
