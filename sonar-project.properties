# SonarCloud Configuration
# https://sonarcloud.io

sonar.organization=ifeyeonlyknew
sonar.projectKey=IfEyeOnlyKnew_stickmynote-client
sonar.projectName=Stick My Note

# Source configuration
sonar.sources=app,components,lib,hooks,types
sonar.tests=__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# TypeScript / JavaScript
sonar.typescript.tsconfigPaths=tsconfig.json
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions - files that don't need analysis
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/public/**,\
  **/coverage/**,\
  **/docs/**,\
  **/*.config.js,\
  **/*.config.ts,\
  **/*.config.mjs,\
  **/scripts/**,\
  **/*.d.ts

# Coverage exclusions - files not expected to have test coverage
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/types/**,\
  app/**/layout.tsx,\
  app/**/loading.tsx,\
  app/**/error.tsx,\
  app/**/not-found.tsx

# Duplicate detection exclusions
#
# app/api/**/route.ts — Next.js REST route handlers inherently share boilerplate
#   (auth check + org context + try/catch + standard response shapes). Shared
#   helpers live in lib/api/route-helpers.ts and lib/handlers/*, but the remaining
#   thin wrappers will always look similar to a token-based duplication detector.
#
# components/ui/** — shadcn/ui primitives are copy-pasted templates by design.
#   Upstream shadcn recommends owning the code locally rather than importing as a
#   dependency, so near-identical components (context-menu/menubar, etc.) are
#   the intended shape of the library.
#
# app/api/v2/** — v2 route copies kept intentionally for gradual migration
#   (see commit c7c76e1). They will be removed once callers are updated.
#
# types/** — type declaration files naturally share interface shapes across
#   related domain types.
sonar.cpd.exclusions=\
  **/types/**,\
  **/components/ui/**,\
  app/api/**/route.ts,\
  app/api/v2/**

# Rule suppressions
# S4123: "Remove this unnecessary await" — false positive in two places:
#   1. Next.js App Router: route params/searchParams are Promise<{}> and MUST be awaited.
#      https://nextjs.org/docs/app/api-reference/file-conventions/page#props
#   2. lib/database/database-adapter.ts: QueryBuilder Proxy implements PromiseLike
#      via a `then` trap, which SonarCloud's static analyzer can't detect.
#      Any `await db.from(...).select(...)` in lib/ is awaiting a valid thenable.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S4123
sonar.issue.ignore.multicriteria.e1.resourceKey=app/**/*
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S4123
sonar.issue.ignore.multicriteria.e2.resourceKey=lib/**/*

# Encoding
sonar.sourceEncoding=UTF-8
